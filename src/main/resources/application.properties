# CONFIGURACIÓN DE PRODUCCIÓN
# ========================================

# URLs dinámicas (se configuran en Railway como variables de entorno)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Servidor
server.address=0.0.0.0
server.port=${PORT:8080}

# OAuth2 Google - Redirect dinámico
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# CORS - Permitir frontend
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ========================================
# BASE DE DATOS
# ========================================
# Railway configura DATABASE_URL automáticamente
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/professional_rating}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# Flyway
spring.flyway.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ========================================
# OAUTH2 GOOGLE
# ========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ========================================
# SESIONES Y COOKIES
# ========================================
# IMPORTANTE: Estas configuraciones son manejadas por el CookieSerializer bean en SecurityConfig
# NO usar las propiedades de Spring Boot aquí porque crean conflicto
server.servlet.session.timeout=1h