# CONFIGURACI”N DE PRODUCCI”N
# ========================================

# URLs din·micas (se configuran en Railway como variables de entorno)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Servidor
server.address=0.0.0.0
server.port=${PORT:8080}

# OAuth2 Google - Redirect din·mico
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# CORS - Permitir frontend
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ========================================
# BASE DE DATOS
# ========================================
# Railway configura DATABASE_URL autom·ticamente
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/professional_rating}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ========================================
# OAUTH2 GOOGLE
# ========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ========================================
# JWT
# ========================================
jwt.secret=${JWT_SECRET:mi-super-secreto-jwt-key-2024-prorate-muy-seguro-12345}
jwt.expiration=15552000000